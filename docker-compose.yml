version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: transport-postgres
    environment:
      POSTGRES_USER: transport
      POSTGRES_PASSWORD: transport
      POSTGRES_DB: transport_assistant
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro

  otp:
    image: opentripplanner/opentripplanner:latest
    container_name: transport-otp
    ports:
      - '8080:8080'
    volumes:
      - ./backend/docker/otp/data:/var/opentripplanner
      - ./backend/docker/otp/graphs:/var/opentripplanner/graphs
    command: ['--build', '--serve', '/var/opentripplanner']

  backend:
    build:
      context: ./backend
    container_name: transport-backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - otp
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
    command: npm run start:dev

volumes:
  postgres_data:
